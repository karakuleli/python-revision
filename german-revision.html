return`<button class="option-btn" onclick="pickAnswer(${i})" style="background:${bg};border-color:${bd};${s.showAns?'pointer-events:none':''}"><span class="option-letter" style="background:${tc}22;color:${tc}">${String.fromCharCode(65+i)}</span><span>${esc(opt)}${em}</span></button>`;}).join('')}</div>
${s.showAns?`<div class="explanation-box ${s.sel===q.correct?'correct-bg':'wrong-bg'}">
<div style="font-weight:800;font-size:14px;margin-bottom:4px;color:${s.sel===q.correct?'#51CF66':'#FF6B6B'}">${s.sel===q.correct?(s.streak>=3?'🔥 Fantastisch!':['Richtig! 🎉','Genau! ⭐','Super! 💪'][Math.floor(Math.random()*3)]):'Nicht ganz! 💡'}</div>
<div style="font-size:13px;color:#b8b8d0;line-height:1.6">${esc(q.explanation)}</div></div>
<button class="btn full-btn" onclick="nextQ()" style="background:linear-gradient(135deg,${tc},${tc}cc)">${s.cq+1>=s.qs.length?'See Results →':'Nächste Frage →'}</button>`:''}
</div>`;return;}

if(s.mode==='results'){
const pct=s.qs.length?Math.round((s.score/s.qs.length)*100):0;
const g=pct>=90?{e:'🌟',m:'Ausgezeichnet! Exam-ready!',c:'#FCC419'}:pct>=70?{e:'💪',m:'Gut gemacht! Nearly there!',c:'#51CF66'}:pct>=50?{e:'📚',m:'Good effort! Review below.',c:'#339AF0'}:{e:'🔄',m:'Weiter üben!',c:'#FF6B6B'};
app.innerHTML=`
<div class="card" style="text-align:center;margin-bottom:20px">
<div style="font-size:56px;margin-bottom:8px">${g.e}</div>
<h2 style="margin:0 0 6px;font-size:28px;font-weight:900;color:${g.c}">${s.score}/${s.qs.length}</h2>
<div class="result-pct" style="background:linear-gradient(135deg,${g.c},${g.c}aa)">${pct}%</div>
<p style="color:#b8b8d0;font-size:16px;margin:0 0 16px;font-weight:600">${g.m}</p>
${s.best>=3?`<div style="display:inline-block;background:rgba(252,196,25,0.12);border:1px solid rgba(252,196,25,0.3);border-radius:10px;padding:6px 16px;font-size:14px;font-weight:700;color:#FCC419">🔥 Streak: ${s.best}</div>`:''}</div>
${s.wrong.length?`<div class="card" style="margin-bottom:20px"><h3 style="margin:0 0 16px;font-size:18px;font-weight:800;color:#FF6B6B">📝 Review These</h3>
${s.wrong.map(q=>`<div class="review-item"><div style="font-size:12px;color:${TC[q.topic]||'#888'};font-weight:800;margin-bottom:4px">${TI[q.topic]||'📝'} ${q.topic}</div>
<div style="font-size:14px;font-weight:700;margin-bottom:6px">${esc(q.question)}</div>
<div style="font-size:13px;color:#51CF66;font-weight:600">✓ ${esc(q.options[q.correct])}</div>
<div style="font-size:13px;color:#9898b8;margin-top:4px;line-height:1.5">${esc(q.explanation)}</div></div>`).join('')}</div>`:''}
<div class="bottom-grid">
<button class="btn card" onclick="startQuiz(${s.qt?`'${s.qt}'`:'null'})" style="text-align:center;cursor:pointer;padding:16px;background:linear-gradient(135deg,#FF6B6B15,#FF6B6B05);border-color:#FF6B6B44"><div style="font-size:24px">🔄</div><div style="font-size:12px;font-weight:800;margin-top:6px">Again</div></button>
<button class="btn card" onclick="S({mode:'cheatsheet',ct:0})" style="text-align:center;cursor:pointer;padding:16px;background:linear-gradient(135deg,#51CF6615,#51CF6605);border-color:#51CF6644"><div style="font-size:24px">📖</div><div style="font-size:12px;font-weight:800;margin-top:6px">Cheat Sheet</div></button>
<button class="btn card" onclick="S({mode:'home'})" style="text-align:center;cursor:pointer;padding:16px;background:linear-gradient(135deg,#339AF015,#339AF005);border-color:#339AF044"><div style="font-size:24px">🏠</div><div style="font-size:12px;font-weight:800;margin-top:6px">Home</div></button>
</div>`;return;}
}

function startQuiz(topic){
let q=topic?QUESTIONS.filter(x=>x.topic===topic):[...QUESTIONS];
q=shuffle(q).map(x=>{const idx=x.options.map((_,i)=>i);const sh=shuffle(idx);return{...x,options:sh.map(i=>x.options[i]),correct:sh.indexOf(x.correct)};});
S({mode:'quiz',qs:q,cq:0,sel:null,showAns:false,score:0,ans:0,streak:0,best:0,wrong:[],qt:topic});}
window.startQuiz=startQuiz;

function pickAnswer(i){if(state.showAns)return;const correct=i===state.qs[state.cq].correct;const ns=correct?state.streak+1:0;
S({sel:i,showAns:true,ans:state.ans+1,score:state.score+(correct?1:0),streak:ns,best:Math.max(state.best,ns),wrong:correct?state.wrong:[...state.wrong,state.qs[state.cq]]});}
window.pickAnswer=pickAnswer;

function nextQ(){if(state.cq+1>=state.qs.length)S({mode:'results'});else S({cq:state.cq+1,sel:null,showAns:false});}
window.nextQ=nextQ;

function startFlash(cat){let cards=cat?FLASHCARDS.filter(c=>c.cat===cat):[...FLASHCARDS];S({mode:'flashcards',fc:shuffle(cards),fi:0,flipped:false,fcCat:cat,fcScore:0,fcTotal:0});}
window.startFlash=startFlash;

function fcRate(knew){const next=state.fi+1>=state.fc.length;S({fcScore:state.fcScore+(knew?1:0),fcTotal:state.fcTotal+1,fi:next?state.fi:state.fi+1,flipped:false,mode:next?'fc_results':'flashcards'});}
window.fcRate=fcRate;

render();
</script>
</body>
</html>
