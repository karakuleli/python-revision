<div class="bottom-grid"><button class="btn card" onclick="startQuiz(${s.qt?`'${s.qt}'`:'null'})" style="text-align:center;cursor:pointer;padding:16px;background:linear-gradient(135deg,#FF6B6B15,#FF6B6B05);border-color:#FF6B6B44"><div style="font-size:24px">🔄</div><div style="font-size:12px;font-weight:800;margin-top:6px">Again</div></button><button class="btn card" onclick="S({mode:'cheatsheet',ct:0})" style="text-align:center;cursor:pointer;padding:16px;background:linear-gradient(135deg,#51CF6615,#51CF6605);border-color:#51CF6644"><div style="font-size:24px">📖</div><div style="font-size:12px;font-weight:800;margin-top:6px">Cheat Sheet</div></button><button class="btn card" onclick="S({mode:'home'})" style="text-align:center;cursor:pointer;padding:16px;background:linear-gradient(135deg,#339AF015,#339AF005);border-color:#339AF044"><div style="font-size:24px">🏠</div><div style="font-size:12px;font-weight:800;margin-top:6px">Home</div></button></div>`;return;}}

function startQuiz(topic){let q=topic?QUESTIONS.filter(x=>x.topic===topic):[...QUESTIONS];q=shuffle(q).map(x=>{const idx=x.options.map((_,i)=>i);const sh=shuffle(idx);return{...x,options:sh.map(i=>x.options[i]),correct:sh.indexOf(x.correct)};});S({mode:'quiz',qs:q,cq:0,sel:null,showAns:false,score:0,ans:0,streak:0,best:0,wrong:[],qt:topic});}window.startQuiz=startQuiz;
function pickAnswer(i){if(state.showAns)return;const c=i===state.qs[state.cq].correct;const ns=c?state.streak+1:0;S({sel:i,showAns:true,ans:state.ans+1,score:state.score+(c?1:0),streak:ns,best:Math.max(state.best,ns),wrong:c?state.wrong:[...state.wrong,state.qs[state.cq]]});}window.pickAnswer=pickAnswer;
function nextQ(){if(state.cq+1>=state.qs.length)S({mode:'results'});else S({cq:state.cq+1,sel:null,showAns:false});}window.nextQ=nextQ;
function startFlash(cat){let c=cat?FLASHCARDS.filter(x=>x.cat===cat):[...FLASHCARDS];S({mode:'flashcards',fc:shuffle(c),fi:0,flipped:false,fcCat:cat,fcScore:0,fcTotal:0});}window.startFlash=startFlash;
function fcRate(k){const n=state.fi+1>=state.fc.length;S({fcScore:state.fcScore+(k?1:0),fcTotal:state.fcTotal+1,fi:n?state.fi:state.fi+1,flipped:false,mode:n?'fc_results':'flashcards'});}window.fcRate=fcRate;
render();
</script>
