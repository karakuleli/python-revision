const Q=[
// CREATION (10)
{topic:"Creation",q:"What was the very first thing God created by speaking?",o:["The sun and moon to light the sky above the Earth","Light, which He then separated from the darkness","The oceans and rivers that would cover the dry land","Plants and trees to provide food for all living things"],c:1,e:"God said 'Let there be light' — this was the very first act of creation, before the sun/moon (Day 4) or anything else."},
{topic:"Creation",q:"According to the student's notes, why specifically did God create plants?",o:["To provide food and shelter for the animals He planned to make","To make the Earth beautiful and colourful for humans to enjoy","To provide oxygen for the living creatures He would create later","To give humans materials for building their homes and their tools"],c:2,e:"The notes specifically say God made plants 'for oxygen' — showing each creation had a specific practical purpose."},
{topic:"Creation",q:"Why is it theologically significant that humans were created LAST on Day 6?",o:["God found humans the hardest to design and needed more time","Everything else had to be prepared first — humans are creation's pinnacle","Humans were an afterthought once God saw animals needed companions","Animals had to be tested first to make sure the world was safe enough"],c:1,e:"Everything — light, land, plants, animals — had to be ready first. Humans are the purpose and high point of creation."},
{topic:"Creation",q:"What is the connection between Day 7 of creation and modern Shabbat practice?",o:["God felt tired after creating and Jews copy this exhaustion each week","God deliberately modelled work-then-rest as a sacred pattern to follow","Jews chose Saturday randomly and later connected it to the creation story","God commanded rest because He worried humans would overwork themselves"],c:1,e:"Shabbat isn't about tiredness — God modelled the work-rest pattern deliberately, establishing it as a sacred commandment."},
{topic:"Creation",q:"The Dog Fable teaches 'don't be greedy'. According to the notes, how does this apply today?",o:["Dogs in modern life are still too greedy and need better training early","People chasing more wealth or fame risk losing what they already have","The fable only applies to people who live near rivers or large bodies of water","Greedy people always end up famous, which is actually the real hidden lesson"],c:1,e:"People can be naive and lose what they actually have while trying to get more — directly relevant to modern consumerism."},
{topic:"Creation",q:"How do fables differ from the creation story in their purpose?",o:["Fables teach moral lessons about behaviour; creation reveals truth about God","Fables come from the Torah while the creation story is from a different source","Fables are historically accurate; the creation story is purely imaginative fiction","Fables are only for young children while the creation account is for adults"],c:0,e:"Fables teach moral lessons about human behaviour. The creation story teaches theological truths about God's nature and power."},
{topic:"Creation",q:"What was created on Day 4, and why might it surprise people?",o:["Land animals were created even though there was no food for them yet","The sun, moon and stars were made — even though light already existed from Day 1","Humans were created early before anything else was ready for them at all","Plants were made without any sunlight, which seems scientifically impossible today"],c:1,e:"Light existed from Day 1, but the sun/moon/stars didn't come until Day 4 — suggesting God's divine light precedes natural sources."},
{topic:"Creation",q:"The Fox Fable teaches 'don't judge a book by its cover'. What example do the notes give?",o:["A fox who looked old but could run faster than all the younger animals","Being polite even to someone who might not look as nice or successful as you","A book that appeared boring but contained the most exciting adventure story ever","A person who judged a fox by its fur but later discovered it was wearing a disguise"],c:1,e:"The notes say people should be polite even to those who 'might not have looked as nice as them' — challenging snap judgements."},
{topic:"Creation",q:"On which day did God create living creatures to fill the sea and the sky?",o:["Day 3, when He also created all the plants and dry land to support them","Day 4, at the same time He created the sun and the moon and the stars","Day 5, before He created land animals and humans on the following day","Day 6, which was the busiest day of the entire creation week by far"],c:2,e:"Day 5 = sea and sky creatures. Day 6 = land animals and humans. The notes say God 'made livestock to fill up the sea and sky'."},
{topic:"Creation",q:"What did God separate FIRST in the creation account?",o:["The dry land from the water that covered the whole surface of Earth","The water in the sky from the water covering the ground below it","Light from darkness — creating the very first day and the first night","The plants from the soil so they could grow upwards toward the light"],c:2,e:"The first separation was light from darkness. Later came water/sky (Day 2) and land/sea (Day 3)."},

// NOAH (10)
{topic:"Noah",q:"What does it mean that Noah's covenant is 'universal'?",o:["It was written in every language so all nations could read and understand it","It applies to all of humanity, unlike later covenants that were just for Jews","It covers every topic including food laws, clothing rules and building codes","It means Noah's family eventually spread to every single country on Earth"],c:1,e:"Universal = all humanity. This differs from later covenants (Abraham, Moses) which are specifically for the Jewish people."},
{topic:"Noah",q:"Noah sent THREE birds in total. What happened with each one?",o:["A dove found nothing, a pigeon found a leaf, and a crow found the olive branch","A crow found nothing, a pigeon found nothing, then a dove brought an olive branch","All three birds returned with olive branches from three different parts of the land","A pigeon was sent first and never returned, then a crow and a dove together"],c:1,e:"First a crow (nothing), then a pigeon (nothing), then a dove returned with an olive branch — building hope through repeated attempts."},
{topic:"Noah",q:"The 7 Noahide Laws are the CONDITIONS of the covenant. What does this mean?",o:["They are optional suggestions that humanity can freely choose to follow or ignore","They are God's side of the deal — a list of things He will do for all of humanity","They are what humanity MUST do in exchange for God's promise of protection","They were Noah's personal rules for his own family during and after the flood"],c:2,e:"A bilateral covenant means both sides have obligations. The 7 laws are humanity's side — what they must do for God's protection to continue."},
{topic:"Noah",q:"Which of the following is the FIRST of the 7 Noahide Laws?",o:["Do not commit murder, as this is the most serious crime against God's creation","Establish courts of justice, because without this the other laws can't be enforced","Do not blaspheme God, as respect for the Creator is the foundation of everything","Do not steal from others, because property rights are essential for a fair society"],c:1,e:"'Establish courts of justice' comes first because without a justice system, none of the other laws can be properly enforced."},
{topic:"Noah",q:"How does the Noah story show God as BOTH just AND merciful at the same time?",o:["God is only just in this story — the flood was pure punishment with no mercy at all","God is only merciful — He saved everyone and the flood was actually quite gentle","Just: punishes wickedness with flood. Merciful: saves Noah and promises no more floods","God couldn't decide between justice and mercy so He compromised with a short flood"],c:2,e:"Justice = punishing humanity's wickedness. Mercy = saving the righteous and making a covenant never to do it again. Both qualities coexist."},
{topic:"Noah",q:"The flood lasted '40 days and 40 nights'. Why might the number 40 be significant?",o:["It was the exact number of days the rain physically lasted according to weather records","40 represents a period of testing and transformation — it recurs throughout the Bible","Ancient calendars only had 40-day months so this simply means about one full month","Noah counted the days wrong because he didn't have a reliable clock on the ark"],c:1,e:"40 appears repeatedly: 40 days of flood, 40 years in wilderness, Jesus fasted 40 days. It symbolises testing and transformation."},
{topic:"Noah",q:"What was the sign God gave to show His covenant promise would be kept?",o:["A dove that would appear in the sky whenever someone broke the Noahide Laws","A rainbow, as a permanent visible reminder that God would never flood Earth again","A special tree that grew on Mount Ararat where the ark finally came to rest","A star that appeared every night to remind Noah's descendants of their promise"],c:1,e:"The rainbow is the sign of God's covenant — a physical, visible reminder of the promise never to flood the Earth again."},
{topic:"Noah",q:"Why were only Noah and his family saved from the flood?",o:["They were the only ones who knew how to build a boat strong enough to survive","They were the only people on Earth who were free from sin and lived righteously","They happened to live near the highest mountain and the water didn't reach them","God chose them randomly as a sample to restart humanity after the flood ended"],c:1,e:"The notes say 'only Noah and his family were free from sin' — God rewards righteousness."},
{topic:"Noah",q:"What did God do to the animals and humans after they left the ark?",o:["He gave them special powers so they could survive in the changed landscape","He divided them into groups and sent each to a different part of the world","He made everything fertile, including the animals, so they could repopulate Earth","He taught them new skills for farming and building so civilisation could restart"],c:2,e:"The notes say God 'made everything fertile including them, and then they re-made humanity' — showing God's creative renewal after judgement."},
{topic:"Noah",q:"Which of the following is one of the 7 Noahide Laws?",o:["Do not eat any meat at all because all animals are sacred creations of God","Do not eat the flesh of a living animal — showing respect for all creatures","Do not eat bread that has been left overnight because it becomes impure","Do not eat food prepared by someone who does not believe in God's covenant"],c:1,e:"The 7th Noahide Law is 'do not eat the flesh of a living animal' — about humane treatment, not vegetarianism."},

// MOSES (2)
{topic:"Moses",q:"Why did Moses' mother place him in a basket on the River Nile?",o:["She wanted him to learn to swim from a young age as all Hebrew boys did","The Pharaoh was dangerous and killing babies — she thought the river was safer","She was following a religious tradition that all firstborn boys must be sent away","The river would carry him to the temple where priests could educate him properly"],c:1,e:"The Pharaoh was 'very bad' and it wasn't safe — his mother thought sending him away on the Nile was the safest option despite the risk."},
{topic:"Moses",q:"What does the story of baby Moses reveal about his mother's situation?",o:["She was wealthy and could afford a specially-made waterproof basket for the journey","She was desperate — sending her baby away was an extreme act of love for his safety","She was following God's direct instructions that were given to her in a clear vision","She knew the Pharaoh's daughter would find him because they had arranged it before"],c:1,e:"Putting a baby in a basket on a river shows absolute desperation — she believed this dangerous act was safer than keeping him at home."},

// PASSOVER (10)
{topic:"Passover",q:"What central event do Jews specifically remember during the Passover festival?",o:["The creation of the world and God's decision to rest on the seventh day of the week","The smiting of the Egyptian firstborns and the Israelites' liberation from slavery","The building of the first temple in Jerusalem under the reign of King Solomon","The giving of the Ten Commandments to Moses on Mount Sinai in the wilderness"],c:1,e:"Passover remembers the Angel of Death passing over Jewish homes, the death of Egyptian firstborns, and the subsequent freedom from slavery."},
{topic:"Passover",q:"How did the Israelites protect their firstborns from the Angel of Death?",o:["They hid their children in underground tunnels beneath their houses all night","They prayed continuously through the entire night until the danger had passed","They smeared lamb's blood on their doors so the angel would pass over them","They sent their firstborns to stay with Egyptian families who were already safe"],c:2,e:"Lamb's blood on the doors was the sign for the Angel of Death to 'pass over' that house — hence the name Passover."},
{topic:"Passover",q:"What does the Zeroa (roasted shank bone) on the Seder plate symbolise?",o:["The bones of Israelite slaves who died while building the Egyptian pyramids","The staffs that Moses and Aaron carried when they confronted the Pharaoh","The Paschal lamb sacrifice that was offered in the temple before the Exodus","The broken chains that fell from the slaves' wrists when they were finally freed"],c:2,e:"The Zeroa specifically represents the Paschal lamb sacrifice offered in the temple before the Exodus from Egypt."},
{topic:"Passover",q:"What does the Beitzah (hard-boiled egg) symbolise on the Seder plate?",o:["The tears that Jewish mothers cried when their children were enslaved by Egypt","The cycle of life and the renewal of spring — its round shape has no beginning or end","The stone that sealed the tomb where the Pharaoh's firstborn son was eventually buried","The sun that rose over Egypt on the morning after the Angel of Death had passed by"],c:1,e:"The egg's round shape symbolises the cycle of life and renewal of spring — no beginning and no end."},
{topic:"Passover",q:"Karpas (green vegetable) is dipped in salt water. What does each part represent?",o:["Green = the Nile river vegetation; salt water = the river's natural mineral content","Green = the colour of Egyptian fields; salt water = the sweat of hardworking farmers","Green = spring, renewal and hope; salt water = the tears shed by the Israelite slaves","Green = the promised land waiting ahead; salt water = the Red Sea they would cross"],c:2,e:"Green vegetable = spring/hope. Salt water = slaves' tears. The contrast shows the journey FROM suffering TO renewal."},
{topic:"Passover",q:"What does Charoset look like, and why is its sweet taste significant?",o:["It looks like desert sand; the sweetness represents the oasis they found during the escape","It looks like mortar and bricks; the sweetness represents hope despite the suffering of slavery","It looks like honey; the sweetness represents the promised land flowing with milk and honey","It looks like clay pottery; the sweetness represents the beautiful art the slaves secretly made"],c:1,e:"Charoset (apple, nuts, cinnamon, wine) looks like mortar/bricks slaves made. Its sweet taste = hope that even in suffering, something better is promised."},
{topic:"Passover",q:"Why is Matzah (unleavened bread) eaten instead of regular risen bread?",o:["Regular bread was considered too luxurious for a meal remembering the suffering of slaves","The Israelites fled Egypt so quickly that there was no time for their bread to rise properly","Ancient Jews believed that yeast was unholy and therefore banned it from religious meals","Matzah was the favourite food of Moses and eating it honours his leadership during Exodus"],c:1,e:"The Israelites fled in such haste that their bread couldn't rise. Matzah represents both the 'bread of affliction' and the urgency of escape."},
{topic:"Passover",q:"What is the purpose of Chazeret (the second bitter herb) on the Seder plate?",o:["It represents a completely different period of suffering from a later point in Jewish history","It serves a similar purpose to Maror and is used in the Korech sandwich with Matzah","It is eaten last to cleanse the palate and prepare for the sweet dessert course that follows","It represents the Pharaoh's bitterness and anger when he discovered the slaves had escaped"],c:1,e:"Chazeret (often romaine lettuce) is a second bitter herb used alongside Matzah in the Korech (Hillel sandwich) — reinforcing the slavery theme."},
{topic:"Passover",q:"What happened to the Egyptian firstborns, and why did this finally free the slaves?",o:["They were sent away to foreign lands, leaving Egypt weakened and unable to keep the slaves","They all became seriously ill, and Pharaoh needed the Jewish slaves to care for them instead","They all died, including the Pharaoh's own son — personal loss finally broke his resistance","They converted to Judaism, and Pharaoh freed the slaves as a peace offering to stop this"],c:2,e:"All Egyptian firstborns died, including Pharaoh's. Previous plagues affected the nation but didn't move him. Personal loss finally broke his resistance."},
{topic:"Passover",q:"Why is Passover described as a story of FREEDOM rather than simply survival?",o:["The Israelites survived a natural disaster and then found better shelter in another land","They weren't just saved from death — they were fully liberated from centuries of slavery","They were free to choose which direction to travel after leaving the borders of Egypt","'Freedom' was the name of the ship they used to cross the Red Sea during their escape"],c:1,e:"Passover isn't just about avoiding death — it's about complete liberation from slavery. They went from being property to being free people."},

// TORAH & SHABBAT (8)
{topic:"Torah",q:"How many letters are in a hand-written Torah scroll?",o:["Approximately 30,000 letters spread across about 100 pages of parchment scrolls","Exactly 304,805 letters written across pages with 42 lines on each single page","Around 3 million letters that take scribes several decades to complete from scratch","About 500,000 letters, though the exact number varies between different scroll versions"],c:1,e:"The Torah contains exactly 304,805 letters, with 42 lines per page — every single letter hand-written by trained scribes."},
{topic:"Torah",q:"Why must the Torah be hand-written rather than printed, even with modern technology?",o:["Printing presses produce ink that fades too quickly for important sacred documents to last","The act of hand-writing is itself considered sacred worship — 'you shall write them'","Hand-written copies are worth more money and help fund synagogue activities and repairs","Modern printers cannot handle the special parchment material that Torah scrolls require"],c:1,e:"The Torah commands 'you shall not paint them, you shall not draw them; you shall write them' — hand-writing IS the sacred method."},
{topic:"Torah",q:"How long does it take an average scribe to write a complete Torah scroll from scratch?",o:["About 2 to 3 weeks if the scribe works full-time hours every single day without breaks","Between 12 and 18 months of dedicated, careful, precise work by a trained professional","Usually around 5 to 10 years because scribes can only work a few hours each week","It varies but typically takes about 1 week per book, so roughly 5 weeks in total time"],c:1,e:"12 to 18 months of painstaking work — showing the extreme devotion and respect for the sacred text."},
{topic:"Torah",q:"What does 'Kosher' mean when referring to a Torah scroll?",o:["The scroll has been blessed by a rabbi during a special ceremony in the synagogue","The scroll is old enough to be considered an antique with historical significance","The scroll meets all Jewish rules and standards — every letter is correctly formed","The scroll has been donated to the synagogue by a wealthy and respected community member"],c:2,e:"Kosher = meets Jewish rules and is acceptable. If the Torah meets every requirement, it's kosher — any mistake means it cannot be used."},
{topic:"Torah",q:"Which commandment establishes the Sabbath (Shabbat) as a day of rest?",o:["The 1st commandment, because rest and worship of God come before everything else","The 4th commandment — 'Remember the Sabbath day, to keep it holy' as God commanded","The 7th commandment, matching the 7th day on which God rested after creating the world","The 10th commandment, because it is the final and therefore most important rule given"],c:1,e:"Shabbat is the 4th commandment. It begins at sunset on Friday and ends at sunset on Saturday."},
{topic:"Torah",q:"Which of these activities is NOT allowed during Shabbat?",o:["Attending synagogue for communal prayer services with family and community members","Sharing festive meals together with family members around the dinner table at home","Driving a car, using electricity, cooking food, shopping, or conducting any business","Studying religious texts, personal reflection, and spending quality time with family"],c:2,e:"Driving, electricity, cooking, shopping, tearing paper and business are all prohibited. Synagogue, festive meals, study and reflection are allowed."},
{topic:"Torah",q:"Which of these activities IS allowed during Shabbat?",o:["Cooking a large festive meal from scratch using the oven and all kitchen appliances","Driving to a friend's house for dinner because it strengthens community friendship","Synagogue attendance, prayer, festive meals, study, reflection, and family togetherness","Shopping for groceries because food is a basic necessity that cannot wait until Sunday"],c:2,e:"Synagogue/prayer, festive meals, study/reflection, and family time are all allowed. But cooking, driving, and shopping are not."},
{topic:"Torah",q:"Why is a CHILD specifically used to test whether a Torah scroll is kosher?",o:["Children are considered holier than adults and closer to God in Jewish religious tradition","If an untrained reader can read it correctly, the letters must be perfectly clear and formed","The child chosen is always the rabbi's own child who has been given special advance preparation","Children have naturally better eyesight than adults and can detect tiny errors more easily"],c:1,e:"The logic is clever: if someone with NO training can read it, the scribe's letters must be flawless. It tests the SCRIBE, not the child."},

// PALESTINE (10)
{topic:"Palestine",q:"How did Emperor Augustus try to maintain a good relationship with the Jewish people?",o:["He converted to Judaism privately and attended temple services whenever he visited Judea","He gave many expensive and impressive gifts to the Jewish temple in Jerusalem regularly","He abolished all taxes for Jewish people and allowed them to govern themselves completely","He appointed Jewish leaders to senior positions throughout the entire Roman government"],c:1,e:"Augustus gave 'many expensive gifts and impressive gifts to their temple' — but still taxed Jews heavily, creating a 'good but rocky' relationship."},
{topic:"Palestine",q:"Who was Pilate, and what was his role in first-century Palestine?",o:["He was a Jewish high priest who led worship services in the Jerusalem temple every day","He was the newly-appointed Roman governor of Judea who arrested and killed Jewish rebels","He was a Pharisee leader who secretly opposed the Romans while pretending to cooperate","He was an Essene prophet who lived in the desert and predicted the coming of the Messiah"],c:1,e:"Pilate was the Roman governor of Judea. The notes say he 'arrested and assassinated' Jewish rebels who tried to resist Roman taxation."},
{topic:"Palestine",q:"The Pharisees believed in resurrection, oral law, and the immortality of the soul. What did they NOT do?",o:["They did not value the written Torah, focusing only on oral traditions passed down verbally","They did not rebel against Rome — instead they worked to preserve Jewish traditions peacefully","They did not believe in God's involvement in daily events, seeing everything as random chance","They did not worship in synagogues, preferring only private prayer at home with their families"],c:1,e:"Pharisees 'opposed Roman rule but wouldn't rebel' — they were practical, preserving traditions under Roman rule rather than fighting."},
{topic:"Palestine",q:"What did the Sadducees believe about life after death, angels and prophecy?",o:["They had strong beliefs in all three and considered them central to true Jewish worship","They rejected all three — focusing only on the written Torah and the present physical life","They believed in life after death but rejected angels and the truth of all prophetic visions","They accepted angels and prophecy but firmly rejected any possibility of life after death"],c:1,e:"Sadducees 'rejected the idea of life after death, the truth of prophecies and the existing of angels, focusing instead on the here and now.'"},
{topic:"Palestine",q:"The Sadducees collaborated with Rome. Why did they choose this approach?",o:["They genuinely admired Roman culture and wanted to adopt Roman customs and religious practices","They believed collaboration was necessary to keep their power and keep the temple functioning","They were forced by the Romans at swordpoint and had absolutely no choice in the matter","They secretly planned to overthrow Rome from the inside by gaining positions of influence first"],c:1,e:"The notes say they 'collaborated with Romans and thought that it was necessary to keep their power and the functioning of the temple.'"},
{topic:"Palestine",q:"Why did the Sadducees decline after the temple was destroyed in 70 CE?",o:["The Romans specifically hunted and executed every known Sadducee after destroying the temple","They relied entirely on the temple — when it was destroyed they refused to change or adapt","They voluntarily dissolved their group and joined the Pharisees to create a unified movement","They migrated to Rome and gradually adopted Roman religion over the following few decades"],c:1,e:"Sadducees 'relied on the temple, making them highly vulnerable to it being destroyed. When the temple was destroyed they refused to change.'"},
{topic:"Palestine",q:"How many Messianic figures did the Essenes expect, and what were their roles?",o:["They expected one Messianic figure who would be a great military general defeating Rome","They expected two: a priestly Messiah to restore proper worship, and a kingly one for Israel","They expected three: a prophet, a priest, and a king who would all arrive simultaneously","They didn't expect any Messiah at all — they believed God would intervene directly Himself"],c:1,e:"The Essenes 'waited for the arrival of two Messianic figures: a priestly Messiah and a kingly Messiah.'"},
{topic:"Palestine",q:"What was the Essenes' view of the Jerusalem temple?",o:["They considered it the holiest and most sacred place on Earth and visited it every single day","They believed it was illegitimate and had been corrupted by the Sadducees who controlled it","They thought it was important but too small and campaigned for it to be rebuilt much larger","They had never heard of the temple because they lived so far away in complete desert isolation"],c:1,e:"Essenes 'believed that the temple was illegitimate and thought that the Sadducees corrupted it.'"},
{topic:"Palestine",q:"Which group's approach to Judaism most closely shaped the religion as it's practised today?",o:["The Sadducees, because their strict focus on written Torah became the modern Jewish standard","The Essenes, because their emphasis on spiritual purity became central to Jewish worship now","The Pharisees, because their synagogue-based worship survived when the temple was destroyed","All three contributed equally, and modern Judaism is an even blend of all their different views"],c:2,e:"Pharisees focused on synagogue/community rather than temple — so when the temple was destroyed, their approach survived and evolved into modern Rabbinic Judaism."},
{topic:"Palestine",q:"How did the Essenes view Roman occupation of Palestine?",o:["They actively fought against the Romans in secret guerrilla warfare from their desert camps","They didn't bother the Romans — they believed the occupation was part of God's divine plan","They collaborated with the Romans even more closely than the Sadducees did at that time","They ignored the Romans completely because they genuinely didn't know Rome had conquered them"],c:1,e:"The Essenes 'didn't bother the Romans and thought that it was all part of God's intervention.'"},

// BIRTH (8)
{topic:"Birth",q:"Why was Jesus born in a stable according to the birth narrative?",o:["Mary and Joseph specifically chose a stable because they wanted a humble birth for Jesus","There was no space available in the inn — they had no other option for shelter that night","Stables were considered sacred places in Bethlehem where all important babies were born","The Roman authorities ordered all Jewish families to give birth outside of the city walls"],c:1,e:"The notes simply state 'there was no space in the inn' — the humble circumstances weren't chosen but became theologically significant."},
{topic:"Birth",q:"Which angel announced to Mary that a Saviour would be born?",o:["The Angel Michael, who is traditionally associated with protection and warfare in heaven","The Angel Gabriel, who told Mary a Saviour had been born and would be found in a manger","The Angel Raphael, who was known for delivering important messages about healing and health","The Angel Uriel, who was responsible for announcing all births in the royal line of David"],c:1,e:"Angel Gabriel told Mary that a Saviour had been born."},
{topic:"Birth",q:"The three gifts from the Magi symbolise Jesus's roles. Which combination is correct?",o:["Gold represents his wisdom, Frankincense represents his healing power, Myrrh represents peace","Gold represents wealth for his family, Frankincense is perfume for baby, Myrrh is medicine","Gold represents his role as king, Frankincense as priest, and Myrrh foreshadows his death","Gold represents the sun, Frankincense represents the moon, and Myrrh represents the stars"],c:2,e:"Gold = king. Frankincense = priest (used in worship). Myrrh = death (burial spice, foreshadowing crucifixion). Together: priest, prophet, king."},
{topic:"Birth",q:"What do the SHEPHERDS represent in the symbolism of the birth story?",o:["They represent the Jewish religious leaders who were the first to accept Jesus's divinity","They represent the humble and ordinary people — God's message came to them before the powerful","They represent Roman soldiers who were guarding the border near Bethlehem that particular night","They represent the Essenes, who lived outside cities and awaited the Messiah in the wilderness"],c:1,e:"Shepherds were lowly workers. The notes say they 'represent the humble' — God's message came to ordinary people FIRST, not elites."},
{topic:"Birth",q:"How does the stable in the birth story connect to Noah's Ark?",o:["Both were built from the same type of wood according to ancient Jewish building traditions","Both had animals present — the stable is seen as a 'new Ark' where God's new creation begins","Noah visited Bethlehem and built the stable himself as a monument centuries before Jesus's birth","Both events took place during a severe flood that threatened the entire region at that time"],c:1,e:"The notes say the stable 'recollects Noah's Ark where God stored his creation' — the new Ark from which God's new creation flows."},
{topic:"Birth",q:"What does the Star in the birth narrative symbolise about Jesus's role?",o:["It symbolises that Jesus was born under a lucky star and would have good fortune throughout life","It represents Jesus as the guide by which all people should follow in order to find the way","It shows that God controls astronomy and can create new celestial objects whenever He wants to","It symbolises the brightness of Jesus's personality that attracted followers from across the world"],c:1,e:"The notes say the star means 'Jesus was the guide by which all should follow in order to find the way.'"},
{topic:"Birth",q:"What is significant about the Magi coming from FAR AWAY to visit Jesus?",o:["Long-distance travel was extremely rare, showing how important the star must have looked","It shows Jesus's message was meant for ALL nations and people, not just the local Jewish community","The Magi were lost and arrived at the stable by accident while searching for a different king","Foreign visitors were common in Bethlehem because it was a major international trading centre"],c:1,e:"The Magi represent the Gentile (non-Jewish) world — showing Jesus's significance extends beyond Israel to all nations."},
{topic:"Birth",q:"Jesus's birth was both humble and special. How do these two aspects work together?",o:["They contradict each other — a birth cannot logically be both humble and special at the same time","Humility (stable, shepherds) shows God values the lowly; special (star, Magi) shows divine purpose","Only the special elements matter — the humble details are just background context without meaning","The humble aspects were added later by authors who wanted to make Jesus seem more relatable"],c:1,e:"God chose the MOST humble circumstances for the MOST important event — challenging human expectations about where greatness comes from."},

// MIRACLES (8)
{topic:"Miracles",q:"What is the definition of a miracle according to the notes?",o:["A lucky event that makes someone feel happy and grateful for the good things they received","A religious story that teaches an important moral or spiritual lesson to its listeners and readers","An event that cannot be explained by nature, brought by a supernatural being to fulfil a purpose","An unusual natural phenomenon like a rainbow or an eclipse that ancient people didn't understand"],c:2,e:"A miracle is 'an event that cannot be explained by the laws of nature, brought about by a supernatural being, to fulfil some purpose or aim.'"},
{topic:"Miracles",q:"The feeding of the 5,000 is categorised as 'Fullness and Abundance'. What happened?",o:["Jesus blessed a farmer's entire wheat field and it produced enough grain for 5,000 families","Jesus made one fish and one piece of bread enough to feed 5,000 people at a single gathering","Jesus multiplied a wealthy man's gold coins so that 5,000 poor families could all buy their food","Jesus taught 5,000 people how to grow their own food so they would never go hungry again"],c:1,e:"Jesus made one fish and one piece of bread enough for 5,000 people — showing God provides abundantly beyond what seems possible."},
{topic:"Miracles",q:"The miracle of the dying child involved which unusual element?",o:["The child was already dead for three days before Jesus arrived and brought them back to life","A ROMAN gladiator asked Jesus to save his sick daughter — Jesus helped even his own enemies","The child was healed by simply touching Jesus's cloak as he walked through the crowded streets","Twin children were both sick and Jesus could only save one, forcing a difficult moral choice"],c:1,e:"A Roman gladiator asked Jesus to save his sick daughter. Even though 'the Romans were rude to the Jews and didn't believe in Jesus, Jesus believed' in helping."},
{topic:"Miracles",q:"A student says 'The Good Samaritan is my favourite miracle'. What is wrong with this statement?",o:["The Good Samaritan isn't in the Bible — it comes from a completely different religious text entirely","Nothing is wrong — the Good Samaritan is correctly classified as one of Jesus's most famous miracles","The Good Samaritan is a PARABLE (a story with meaning), not a miracle (a supernatural event)","The Good Samaritan was actually performed by God the Father, not by Jesus, so it's God's miracle"],c:2,e:"PARABLES ARE NOT MIRACLES! Parables are stories with moral/spiritual meaning. Miracles are supernatural events. The Good Samaritan is a story Jesus told."},
{topic:"Miracles",q:"Turning water into wine is categorised under which miracle theme?",o:["Renewed Life — because wine represents new life and the transformation of ordinary into sacred","Fullness and Abundance — because Jesus created far more wine than the wedding guests could drink","Conquering Celebration — because joy and celebration triumphed over shortage and potential failure","Healing — because wine was considered medicinal in ancient times and cured many common illnesses"],c:2,e:"Water to wine = Conquering Celebration. The wedding was about to fail (no wine). Jesus conquered the problem and transformed it into joyful celebration."},
{topic:"Miracles",q:"How would believing in Jesus's miracles influence a Christian today, according to the notes?",o:["They would reject modern medicine entirely and rely only on prayer for all of their healing needs","All miracles teach about giving second chances and helping everyone, even people considered enemies","Christians would try to perform their own miracles daily to prove the strength of their personal faith","Believing in miracles has no practical impact — it is purely a matter of historical academic interest"],c:1,e:"The notes say miracles are 'about giving people a second chance, helping them' — even enemies, like the Roman gladiator's daughter."},
{topic:"Miracles",q:"What miracle category does healing a blind man fall under?",o:["Conquering Celebration — because the man celebrated being able to see for the very first time ever","Fullness and Abundance — because Jesus gave the man more sight than a normal person would have","Renewed Life — because the blind man was close to death and Jesus saved his life at the last moment","Healing — Jesus restored the man's sight, making someone who was blind able to see again clearly"],c:3,e:"Healing the blind man = the Healing category. Jesus 'made a blind man able to see again.'"},
{topic:"Miracles",q:"What do ALL of Jesus's miracles have in common, according to the notes?",o:["They all took place in Jerusalem during the final week of Jesus's life before the crucifixion","They all required the person being helped to first declare their complete faith in Jesus publicly","They are all about giving people second chances and helping those in need, including enemies","They were all witnessed by exactly twelve disciples who then recorded them word for word"],c:2,e:"The notes say 'all of these miracles are about giving people a second chance, helping them.'"},

// PARABLES (6)
{topic:"Parables",q:"What is the definition of a parable?",o:["A supernatural event that proves God's power and cannot be explained by natural laws of science","An ancient law or commandment that Jews must follow as part of their covenant agreement with God","An earthly story using normal everyday situations that carries a heavenly or spiritual meaning","A historical record of something that actually happened during Jesus's life written by witnesses"],c:2,e:"A parable is 'an earthly story with a heavenly meaning' — normal situations with spiritual lessons."},
{topic:"Parables",q:"What is the primary moral of the Good Samaritan parable?",o:["Always carry enough money when travelling in case you are robbed and need medical treatment","Love your neighbour as yourself and show compassion to anyone in need regardless of background","Never travel alone on dangerous roads because robbers are common between Jerusalem and Jericho","Religious leaders like priests and Levites are unreliable and should not be trusted to help others"],c:1,e:"The Good Samaritan teaches 'loving your neighbour as yourself, showing compassion to anyone in need, treat everyone the same.'"},
{topic:"Parables",q:"What does the Dishonest Steward parable teach about wealth and God?",o:["Wealth is always evil and Christians must give away everything they own to be truly faithful","Use worldly wealth for godly purposes rather than personal gain — you cannot serve money AND God","Being dishonest about money is acceptable if you use the profits to help the poor and the needy","God rewards those who are the most financially successful because wealth shows divine favour"],c:1,e:"The parable teaches 'use worldly wealth for eternal, godly purposes rather than personal gratification' and 'one cannot serve money and God.'"},
{topic:"Parables",q:"What does the Dishonest Steward teach about faithfulness in small matters?",o:["Small things don't matter at all — only major life decisions affect your standing before God","Faithfulness in handling small earthly matters is a test of your overall trustworthiness and character","You should focus only on big responsibilities and delegate all small tasks to other less important people","Small matters should be handled dishonestly to save time for the larger spiritual duties that matter more"],c:1,e:"'Faithfulness in handling small earthly matters is a test of trustworthiness' — how you handle small things reveals your true character."},
{topic:"Parables",q:"Why did Jesus use stories about ordinary life rather than complex theological arguments?",o:["Jesus wasn't educated enough to discuss complex theology with the religious scholars of his time","Everyday stories were accessible to all his listeners — farmers, fishermen, tax collectors could understand","The Pharisees had banned public theological discussion, so Jesus was forced to use coded stories","Jewish law specifically required all religious teachers to communicate only through fictional narratives"],c:1,e:"Jesus's audience was ordinary people. By using everyday situations (farming, money, travel), deep spiritual truths became accessible to everyone."},
{topic:"Parables",q:"What is the CRUCIAL difference between a parable and a miracle?",o:["Parables happened in the Old Testament; miracles only happened in the New Testament accounts","Parables are stories with moral or spiritual meaning; miracles are supernatural events that really occurred","Parables were told by Jesus's followers; miracles were only performed by Jesus Himself directly","Parables teach about money and wealth; miracles teach about healing and physical restoration only"],c:1,e:"⚠ Parables = STORIES with meaning. Miracles = supernatural EVENTS. They are completely different categories. Never confuse them!"},

// DEATH (8)
{topic:"Death",q:"How did Jesus die?",o:["He died of old age after a long life of teaching and performing miracles throughout the region","He was poisoned at the Last Supper by one of his closest disciples who had betrayed him secretly","He died by Roman crucifixion — a punishment reserved for the worst criminals in the Roman Empire","He died in battle while leading a rebellion against the Roman occupation forces in Jerusalem"],c:2,e:"Jesus died by Roman crucifixion — the notes say this punishment was for 'robbers, political activists, rebels, slaves, enemies of the state.'"},
{topic:"Death",q:"Why did Roman authorities want Jesus crucified?",o:["He had stolen valuable items from the temple treasury and the Romans wanted to punish theft","They viewed him as a political threat — a potential rebel king who could challenge Roman authority","He had attacked Roman soldiers in the marketplace and they wanted revenge for the public insult","He refused to pay his taxes, and the Romans crucified anyone who didn't contribute to the empire"],c:1,e:"Romans saw Jesus as a political threat — 'a potential rebel king' — which challenged Roman authority and Caesar's rule."},
{topic:"Death",q:"Why did Jewish leaders want Jesus dead?",o:["He refused to attend synagogue services and openly mocked their sacred religious traditions in public","They viewed him as a blasphemer who was challenging their religious authority and established power","He had stolen sacred scrolls from the temple and was selling them to Roman collectors for profit","They were jealous of his wealth because Jesus had become the richest person in all of Palestine"],c:1,e:"Jewish leaders saw Jesus as 'a blasphemer challenging their authority' — claiming divine status was the ultimate religious offence."},
{topic:"Death",q:"Why do Christians describe Jesus's death as a SACRIFICE?",o:["He sacrificed his free time to teach people, which eventually made the Romans suspicious of him","He gave up his wealth and property before dying, distributing everything to the poorest members","He was a sinless substitute who voluntarily took the punishment that all of humanity deserved for sin","He sacrificed many animals at the temple before his death to ensure his followers would be forgiven"],c:2,e:"Christians believe Jesus 'acted as a sinless substitute, voluntarily paying the penalty for humanity's sins to reconcile them with God.'"},
{topic:"Death",q:"Why do Christians describe Jesus's death as a VICTORY?",o:["He defeated the Roman army in a battle just before his death, winning freedom for Jewish slaves","His subsequent resurrection broke the power of sin, death and the devil, securing eternal life","He won a public debate against the Pharisees and Sadducees, proving his theological arguments right","He successfully completed his mission of teaching all twelve disciples before the crucifixion happened"],c:1,e:"Victory because 'his subsequent resurrection broke the power of sin, death and the devil, securing eternal life with believers.'"},
{topic:"Death",q:"What happened in the Jewish temple at the exact moment Jesus died?",o:["The eternal flame that had burned for centuries in the temple suddenly went out without any explanation","The curtain in the temple ripped completely in half from top to bottom in a dramatic supernatural event","The golden altar in the centre of the temple cracked into two pieces and fell to the stone floor","Every scroll in the temple library unrolled simultaneously and the ink faded from all of the pages"],c:1,e:"The curtain in the Jewish temple ripped in half when Jesus died — symbolising the barrier between God and humanity being removed."},
{topic:"Death",q:"Who helped Jesus carry the heavy cross up the hill to the crucifixion site?",o:["Peter, his closest disciple, who had promised he would never leave Jesus alone in any situation","Simon, an ordinary bystander who was pulled from the crowd by soldiers to share the burden","Mary Magdalene, who walked beside him the entire way and supported him both physically and spiritually","Judas, who felt guilty about his betrayal and tried to make amends by helping carry the cross"],c:1,e:"Simon helped carry the cross — the notes simply say 'He carried a heavy cross up the hill. Simon helped him.'"},
{topic:"Death",q:"How does Jesus's death LINK to the Passover lamb sacrifice?",o:["Both happened at exactly midnight during the spring equinox under a perfectly full moon in the sky","The Passover lamb was sacrificed for freedom from slavery; Jesus was sacrificed for freedom from sin","Both the lamb and Jesus were resurrected on the third day after their deaths in an identical way","The Passover lamb was given as a gift to Pharaoh, just as Jesus was handed over to Pontius Pilate"],c:1,e:"Crucial link: Passover lamb's sacrifice → freedom from slavery. Jesus's sacrifice → freedom from sin. Same pattern of sacrifice leading to liberation."},

// RESURRECTION (8)
{topic:"Resurrection",q:"On which day of the week was Jesus's empty tomb discovered?",o:["It was discovered on Friday evening, just before the beginning of the Sabbath rest period","It was discovered on Saturday afternoon, during the Sabbath, by a group of temple priests","It was discovered on Sunday morning, which is why Christians worship on Sundays as 'the Lord's Day'","It was discovered on Monday morning, after everyone returned to their normal weekly routines"],c:2,e:"The tomb was found empty on Sunday morning. This is why Christians worship on Sunday rather than Saturday (Jewish Shabbat)."},
{topic:"Resurrection",q:"Who is recorded as being present at the tomb in all four Gospel accounts?",o:["Simon Peter, who ran to the tomb immediately after hearing the news from the other disciples","The Apostle John, who is described as 'the disciple whom Jesus loved' in his own Gospel account","Mary Magdalene, who appears in Matthew, Mark, Luke and John's accounts of the empty tomb","Joseph of Arimathea, who had originally donated the tomb for Jesus's burial after crucifixion"],c:2,e:"Mary Magdalene was present at the tomb in ALL four Gospel accounts — she is the constant witness across all versions."},
{topic:"Resurrection",q:"True or False: Jesus resurrected on a Saturday.",o:["True — Saturday was the Jewish Sabbath and Jesus rose on the day of rest as a sign of peace","False — Jesus resurrected on Sunday, which is why Christians call it 'the Lord's Day' for worship","True — Jesus rose at sunset on Saturday, which is technically the beginning of Sunday in Jewish time","False — Jesus actually resurrected on Friday evening, just three hours after the crucifixion ended"],c:1,e:"FALSE. Jesus resurrected on SUNDAY, not Saturday. This is why Christians worship on Sunday — 'the Lord's Day.'"},
{topic:"Resurrection",q:"According to Mark's Gospel, which three women went to the tomb?",o:["Mary Magdalene, Mary the mother of Jesus, and Martha the sister of Lazarus from Bethany","Mary Magdalene, Mary the mother of James, and Salome — they went to anoint Jesus's body","Mary Magdalene, Elizabeth the mother of John the Baptist, and Joanna the wife of Chuza","Mary Magdalene, the woman at the well, and the widow from Nain whose son Jesus had raised"],c:1,e:"Mark specifically names Mary Magdalene, Mary the mother of James, and Salome as the three women who went to the tomb."},
{topic:"Resurrection",q:"According to John's Gospel, which two disciples went to the tomb?",o:["James and Andrew, the two brothers who were the first disciples Jesus called to follow him","Thomas and Bartholomew, who were skeptical and wanted to see physical evidence for themselves","Simon Peter and John, who ran to the tomb after hearing the report from Mary Magdalene directly","Matthew and Judas, though Judas went separately out of guilt for his earlier betrayal of Jesus"],c:2,e:"In John's Gospel, Simon Peter and John went to the tomb after hearing from Mary Magdalene."},
{topic:"Resurrection",q:"Why are there FOUR different accounts of the resurrection in the Bible?",o:["Because three of them contain deliberate errors that readers are supposed to identify and correct","Because different authors recorded the events from their own individual unique perspectives","Because each account describes a completely different resurrection that happened on different days","Because the Church combined four separate religions' stories into one narrative for convenience"],c:1,e:"The notes say 'it was a long time ago and different authors recorded events from different perspectives' — genuine witnesses, not copies."},
{topic:"Resurrection",q:"Matthew's Gospel includes a dramatic detail the others don't. What is it?",o:["A choir of a thousand angels singing hymns of victory over the open tomb as the sun rose","An earthquake and an angel sitting on the rolled-away stone at the entrance to the tomb","A flash of lightning that struck the Roman guards and temporarily blinded all of them at once","The stone rolling away by itself while a voice from heaven announced the resurrection to all people"],c:1,e:"Matthew's account includes an earthquake and an angel sitting on the tomb door — the most dramatic of the four accounts."},
{topic:"Resurrection",q:"How did the women react to the empty tomb according to Mark's Gospel?",o:["They immediately celebrated with joy and ran to tell absolutely everyone the incredible good news","They responded with fear, trembling, astonishment and silence at what they had discovered that morning","They calmly discussed what might have happened and decided to investigate the surrounding area first","They became angry and accused the Roman guards of stealing Jesus's body during the night hours"],c:1,e:"Mark says the women reacted 'with fear, trembling, astonishment, and silence' — an honest, human response to something extraordinary."},

// CONNECTIONS (4)
