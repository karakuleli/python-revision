// ===== CREATION (10) =====
{topic:"Creation",question:"Why is the ORDER of creation significant — why are humans created last on Day 6?",options:["Because they were hardest to make","Everything else had to be prepared for them first — they are the pinnacle of creation","It was random","Because animals needed to be created first to eat"],correct:1,explanation:"Humans come last because everything else — light, land, plants, animals — had to be ready first. Humans are the pinnacle and purpose of creation."},

{topic:"Creation",question:"The Dog Fable teaches 'don't be greedy'. How might this apply to modern life?",options:["People should never want anything","People chasing more wealth or fame may lose what they already have","Dogs shouldn't eat too much","It only applies to animals"],correct:1,explanation:"The fable warns that people who are naive and always want more (money, fame) risk losing what they actually have — relevant to consumerism today."},
{topic:"Creation",question:"What does 'creation ex nihilo' mean and why is it important?",options:["Creation from existing materials","Creation from nothing — it shows God's unlimited power","Creation from water","Creation by accident"],correct:1,explanation:"Ex nihilo = 'from nothing'. It's theologically important because it means God is all-powerful and independent — He didn't need pre-existing materials."},
{topic:"Creation",question:"How do fables differ from the creation story in their PURPOSE?",options:["Fables are true, creation is false","Fables teach moral lessons about behaviour; creation teaches theological truth about God","They're exactly the same","Fables are in the Bible, creation isn't"],correct:1,explanation:"Fables (dog, fox) teach moral lessons about human behaviour. The creation story teaches theological truths about God's nature and power."},

{topic:"Creation",question:"The Fox Fable teaches 'don't judge a book by its cover'. What deeper lesson does this carry?",options:["Always read books","Appearances can be deceiving — treat people with respect regardless of how they look","Foxes are wise","Books are important"],correct:1,explanation:"It challenges people to look beyond appearances and be polite to everyone, even if they don't look 'as nice' — a lesson about respect and equality."},
{topic:"Creation",question:"In what order were living creatures created?",options:["Land animals → sea creatures → birds","Sea/sky creatures (Day 5) → land animals and humans (Day 6)","All at once on Day 5","Humans first, then animals"],correct:1,explanation:"Day 5: sea and sky creatures. Day 6: land animals then humans. This shows a progression from simple to complex."},
{topic:"Creation",question:"Why might a religious person argue the creation story shouldn't be read as a scientific account?",options:["Because it's wrong","Its purpose is theological truth about WHO created, not HOW — it's about meaning, not mechanism","Because it's too short","Religious people don't believe in science"],correct:1,explanation:"Many religious scholars argue Genesis answers WHY and WHO (God, with purpose) rather than HOW (scientific process). It's about theological meaning."},
{topic:"Creation",question:"What is significant about God 'separating' things throughout creation?",options:["God likes things tidy","Separation creates order from chaos — showing God brings structure and purpose","It was easier that way","Nothing — it's just description"],correct:1,explanation:"The repeated pattern of separation (light/dark, water/sky, land/sea) shows God bringing order from chaos — a key theological theme."},

// ===== NOAH (12) =====
{topic:"Noah",question:"A covenant is a bilateral agreement. What does THIS mean about the Noahide Laws?",options:["Only God has to follow them","They are suggestions, not rules","They are humanity's side of the deal — conditions humans must meet for God's protection","They only apply to Noah's family"],correct:2,explanation:"Bilateral = both sides. God promises never to flood again. In return, humanity must follow the 7 laws. Break the conditions → break the covenant."},
{topic:"Noah",question:"Why is it significant that Noah's covenant is described as 'universal'?",options:["It means it's written in a universal language","It applies to ALL humanity, not just one group — unlike later covenants with just the Jews","It means it's universally agreed upon","It's the biggest covenant"],correct:1,explanation:"Universal = all humanity. This is different from later covenants (e.g., with Abraham/Moses) which apply specifically to the Jewish people."},
{topic:"Noah",question:"What is the symbolic meaning of the dove returning with an olive branch?",options:["Doves like olives","It represents peace, hope, and new beginnings — the end of God's punishment","It means the flood is getting worse","The dove was hungry"],correct:1,explanation:"The olive branch symbolises peace and hope. It shows God's punishment has ended and a new beginning is possible — still used as a peace symbol today."},
{topic:"Noah",question:"Why did God choose to save ANIMALS as well as Noah's family?",options:["Noah liked animals","To show that ALL of creation matters to God, not just humans","The animals built the ark","Animals are more important than humans"],correct:1,explanation:"Saving two of each creature shows God values ALL creation, not just humanity. This links to the birth narrative where animals are also present."},
{topic:"Noah",question:"The 7 Noahide Laws include 'establish courts of justice'. Why is this first?",options:["It was written first","Without justice systems, none of the other laws can be enforced — it's the foundation","Courts are more important than God","It's alphabetical"],correct:1,explanation:"Justice is listed first because without a system to enforce laws, the other rules (no murder, no stealing etc.) would be meaningless. It's the foundation of civilised society."},
{topic:"Noah",question:"How does the story of Noah present God's character as BOTH merciful AND just?",options:["God is only merciful","God is only just","Just: He punishes wickedness with the flood. Merciful: He saves the righteous and promises never to do it again","God is neither"],correct:2,explanation:"God shows justice by punishing humanity's wickedness, but mercy by saving Noah's family and making a covenant never to flood again. Both qualities coexist."},
{topic:"Noah",question:"The flood lasted '40 days and 40 nights'. Why might the number 40 be significant in the Bible?",options:["It's a random number","40 represents a period of testing, trial or transformation — it appears repeatedly in scripture","It was exactly 40 days","40 was Noah's age"],correct:1,explanation:"40 is used repeatedly: 40 days of flood, 40 years in wilderness, Jesus fasted 40 days. It symbolises a period of testing and transformation."},
{topic:"Noah",question:"'Do not eat the flesh of a living animal' — what does this Noahide Law suggest about Jewish ethics?",options:["Jews must be vegetarian","It shows concern for animal welfare and respect for all living creatures","Animals can't be eaten at all","It's about cooking properly"],correct:1,explanation:"This law shows that even when animals ARE eaten, it must be done humanely. It reflects a deep ethical concern for the welfare of all living creatures."},
{topic:"Noah",question:"What would happen if one side broke the covenant?",options:["Nothing — covenants can't be broken","The covenant would be void — both sides must keep their promises","Only God's side matters","The rainbow would disappear"],correct:1,explanation:"A covenant is a contract. If humanity breaks the laws (their side of the deal), they break the covenant. This is why the Noahide Laws are so important."},
{topic:"Noah",question:"How does Noah's story contrast with the creation story?",options:["They're completely unrelated","Creation = God making everything. Noah = God destroying and RE-creating — showing God can both create and judge","Noah came before creation","They tell the same story"],correct:1,explanation:"Creation is building up. The flood is tearing down. But then God re-creates through Noah's family — showing the cycle of creation, judgement, and renewal."},
{topic:"Noah",question:"Why did Noah send a crow AND a pigeon before the dove?",options:["He had many birds","To show repeated failed attempts — building tension and making the dove's success more meaningful","The crow and pigeon were faster","He sent them by accident"],correct:1,explanation:"The failed attempts with the crow and pigeon build narrative tension and make the dove's olive branch more meaningful — persistence and hope rewarded."},
{topic:"Noah",question:"How does Noah's covenant link to the later covenant at Passover?",options:["They're unrelated","Both involve God saving the righteous from destruction and establishing a new relationship with humanity","Both involve floods","Both involve doves"],correct:1,explanation:"Both follow the pattern: humanity in crisis → God intervenes to save the faithful → a new covenant/relationship established. Noah = universal. Passover = specifically with Israel."},

{topic:"Passover",question:"Why is Passover described as a story of FREEDOM rather than just a story of survival?",options:["Because they survived the flood","The Israelites didn't just survive — they were LIBERATED from centuries of slavery, gaining self-determination","They were free to eat lamb","They survived the plagues"],correct:1,explanation:"Passover isn't just about avoiding death — it's about complete liberation from slavery. The Israelites went from being property to being free people."},
{topic:"Passover",question:"Charoset tastes sweet but represents mortar used by slaves. Why this contradiction?",options:["It's a mistake","The sweetness represents HOPE that even in suffering, there is the promise of something better","They didn't have bitter ingredients","To make it taste nice"],correct:1,explanation:"The deliberate contrast between sweet taste and bitter meaning shows that even in the darkest times of slavery, there was hope for freedom. Suffering isn't permanent."},
{topic:"Passover",question:"Why is Karpas (green vegetable) dipped in SALT WATER specifically?",options:["For taste","Green = spring/renewal/hope. Salt water = tears of slaves. The contrast shows the journey FROM suffering TO renewal","To clean the vegetable","Salt preserves food"],correct:1,explanation:"The combination is deliberate: the green vegetable represents new life and hope, while the salt water recalls tears. Together they symbolise the journey from slavery to freedom."},
{topic:"Passover",question:"Why do Jews retell the Passover story EVERY year? Why not just remember it privately?",options:["They forget easily","'In every generation, one must see oneself as having personally left Egypt' — retelling keeps the experience ALIVE and PERSONAL","It's just tradition","To teach cooking"],correct:1,explanation:"The Haggadah instructs every Jew to feel as if THEY personally left Egypt. Annual retelling makes ancient history personally meaningful for each generation."},
{topic:"Passover",question:"How does the Passover lamb sacrifice LINK to the Christian understanding of Jesus's death?",options:["There is no link","The lamb died so Israelites could be saved → Jesus (called 'Lamb of God') died so humanity could be saved from sin","Both involve animals","Both happened in spring"],correct:1,explanation:"This is a crucial cross-topic link: the Passover lamb was sacrificed so Jews could be free. Christians see Jesus as the ultimate 'Lamb of God' sacrificed for humanity's freedom from sin."},
{topic:"Passover",question:"Why is Matzah called 'bread of affliction' AND a symbol of freedom?",options:["It's a contradiction that makes no sense","It represents BOTH: the suffering of slavery AND the urgency of escape to freedom — affliction and liberation are connected","Only one meaning is correct","It was named wrong"],correct:1,explanation:"Matzah holds both meanings simultaneously: the flatbread of poor slaves AND the bread of people fleeing so fast it couldn't rise. Suffering and liberation are two sides of the same story."},
{topic:"Passover",question:"What happened to the Pharaoh's firstborn and why was this the final plague?",options:["Nothing happened to Pharaoh","Pharaoh's own firstborn died — this struck him PERSONALLY and finally broke his resistance","Pharaoh's firstborn escaped","The firstborn became a slave"],correct:1,explanation:"Previous plagues affected the nation, but Pharaoh didn't care. When HIS OWN son died, it became personal — finally breaking his resistance and freeing the slaves."},
{topic:"Passover",question:"What does the Zeroa (shank bone) specifically symbolise?",options:["The ark","The Paschal lamb sacrifice offered in the temple BEFORE the Exodus — linking sacrifice to freedom","Noah's offering","Just a bone"],correct:1,explanation:"The shank bone represents the specific lamb sacrifice made in the temple before the Exodus. It connects the ideas of sacrifice and freedom."},
{topic:"Passover",question:"Why might a non-religious person still find value in the Passover story?",options:["They wouldn't","It's a universal story about fighting oppression, valuing freedom, and remembering history — these themes transcend religion","Only for the food","It's good entertainment"],correct:1,explanation:"The themes of liberation, justice, remembering history, and fighting oppression are universal human values that resonate beyond any specific religion."},
{topic:"Passover",question:"How does the Seder plate work as a TEACHING TOOL rather than just a meal?",options:["It's just food","Every item has symbolic meaning — by eating and discussing each one, the STORY is experienced through all the senses, making it memorable","It looks nice","It saves time"],correct:1,explanation:"The Seder plate is brilliant education: you SEE, TASTE, SMELL and DISCUSS each item. Using all senses makes the story far more memorable than just reading about it."},

// ===== TORAH & SHABBAT (8) =====
{topic:"Torah",question:"Why must the Torah be HAND-WRITTEN rather than printed?",options:["Printers didn't exist","The physical act of writing is considered SACRED — it shows love, respect and devotion. The process matters, not just the product","Hand-writing looks better","To create jobs for scribes"],correct:1,explanation:"'You shall write them' — the Torah itself commands hand-writing. The sacred act of writing each of the 304,805 letters IS an act of worship and devotion."},
{topic:"Torah",question:"Why is a CHILD used to test if a Torah is kosher?",options:["Children are smarter","If someone UNTRAINED can read it correctly, the letters must be perfectly formed — it tests clarity, not intelligence","Children have better eyes","It's a reward for the child"],correct:1,explanation:"Using an untrained child is clever: if they can read it, the writing must be flawless. It's not about the child's ability — it's about the scribe's precision."},
{topic:"Torah",question:"A scribe takes 12–18 months to write one Torah. What does this tell us about Jewish attitudes to their holy text?",options:["They're slow writers","The Torah is so sacred that its physical form deserves EXTREME care and dedication — quality over speed","They don't have enough scribes","It's not important to them"],correct:1,explanation:"The enormous time investment shows the Torah isn't just 'a book' — it's a sacred object deserving of the highest craftsmanship. The effort itself is an act of worship."},
{topic:"Torah",question:"How does Shabbat observance LINK BACK to the creation story?",options:["It doesn't","God created for 6 days and rested on the 7th → Shabbat follows this exact pattern, connecting daily life to creation","Shabbat is about Noah","Shabbat celebrates Passover"],correct:1,explanation:"The theological basis for Shabbat is directly in Genesis: God worked 6 days, rested on the 7th. By observing Shabbat, Jews live according to the rhythm God established at creation."},
{topic:"Torah",question:"What does 'kosher' mean in the context of the Torah scroll?",options:["Fit to eat","It meets all Jewish rules and standards — every letter is correctly formed and the scroll is acceptable for use","Old and valuable","Written by a rabbi"],correct:1,explanation:"Kosher literally means 'fit' or 'proper'. A kosher Torah meets every requirement — any mistake means it cannot be used in synagogue worship."},
{topic:"Torah",question:"Why is Shabbat sometimes called a 'gift' from God rather than just a rule?",options:["God gives presents on Shabbat","It provides rest, family time, and spiritual renewal — it's designed to BENEFIT people, not just restrict them","It's not a gift","Because candles are lit"],correct:1,explanation:"Shabbat isn't just 'don't work' — it's a gift of rest, family connection, and spiritual renewal. The 'rules' exist to protect this sacred time of restoration."},
{topic:"Torah",question:"If even ONE letter is wrong in a Torah scroll, the entire scroll cannot be used. What does this reveal?",options:["Scribes are stressed","Every single word is considered divinely inspired and sacred — accuracy reflects reverence for God's word","It's an overreaction","Nothing important"],correct:1,explanation:"The zero-tolerance policy shows that Jews believe every letter is sacred and divinely inspired. Even one error would disrespect God's word."},
{topic:"Torah",question:"How does Shabbat bring Jews CLOSER to God?",options:["It doesn't","By stopping work and daily distractions, Jews create SPACE for prayer, Torah reading, and reflection — focusing entirely on God","By going to a special place","By fasting"],correct:1,explanation:"Shabbat removes the noise of daily life. Without work, phone, cooking etc., Jews can focus entirely on God, family, and spiritual matters."},

// ===== FIRST CENTURY PALESTINE (10) =====
{topic:"Palestine",question:"Why is it important to understand the Pharisees, Sadducees and Essenes to understand Jesus's story?",options:["It's not important","Jesus lived among these groups — their beliefs and conflicts directly shaped the events of his life, death and the early Church","They were his friends","They're mentioned in every chapter"],correct:1,explanation:"Understanding these groups explains WHY Jewish leaders opposed Jesus, WHY Romans crucified him, and HOW early Christianity developed in response to these existing tensions."},
{topic:"Palestine",question:"The Pharisees survived the destruction of the temple in 70 CE but the Sadducees didn't. Why?",options:["Pharisees were stronger","Pharisees focused on SYNAGOGUE worship and community — they could adapt. Sadducees DEPENDED on the temple and refused to change","Sadducees chose to leave","Romans liked Pharisees more"],correct:1,explanation:"This is a key comparison: Pharisees had built Jewish life around synagogues and community, so when the temple fell, they adapted. Sadducees' entire identity was temple-based, so they collapsed."},
{topic:"Palestine",question:"The Sadducees collaborated with Rome. Was this purely selfish or could it be justified?",options:["Purely selfish","Arguably pragmatic: collaboration kept the temple functioning and preserved SOME Jewish autonomy — but it also served their power","It was brave","They had no choice"],correct:1,explanation:"This is nuanced. Collaboration kept the temple running (serving all Jews) but also preserved Sadducee power. Both motives likely coexisted — self-interest AND pragmatism."},
{topic:"Palestine",question:"Why did the Essenes believe the temple was 'illegitimate'?",options:["It was too small","They believed the Sadducees had CORRUPTED it — the wrong people were running it improperly","They didn't believe in God","Temples aren't in the Torah"],correct:1,explanation:"The Essenes didn't reject the temple concept — they rejected its current LEADERSHIP. They believed the Sadducees had corrupted proper worship."},
{topic:"Palestine",question:"Compare: How did each group view the MESSIAH?",options:["All three agreed","Pharisees: kingly figure restoring sovereignty. Essenes: TWO messiahs (priestly + kingly). Sadducees: cautious, avoided messianic politics","None believed in a Messiah","Only Essenes believed"],correct:1,explanation:"Key comparison: Pharisees expected one kingly Messiah. Essenes expected TWO (priestly + kingly). Sadducees avoided messianic talk to protect their Roman alliance."},
{topic:"Palestine",question:"The Pharisees valued an 'oral law' alongside the written Torah. Why did the Sadducees reject this?",options:["They couldn't read","Sadducees believed ONLY the written Torah was authoritative — the oral law was human tradition, not God's word","They agreed with it","The oral law was lost"],correct:1,explanation:"Sadducees were strict literalists — only what was WRITTEN in Torah counted. The oral law (centuries of interpretation and rules) was, to them, merely human tradition."},
{topic:"Palestine",question:"The Essenes 'didn't bother the Romans'. What does this tell us about their worldview?",options:["They were cowards","They believed Roman occupation was part of GOD'S PLAN — divine intervention would resolve it, not human rebellion","They liked Romans","They lived too far away"],correct:1,explanation:"The Essenes had a deeply theological view: everything was God's will. Roman occupation was part of God's plan, and God would sort it out through messianic intervention."},
{topic:"Palestine",question:"Emperor Augustus gave expensive gifts to the Jewish temple. Why would a Roman emperor do this?",options:["He was Jewish","Political strategy — keeping the temple community happy helped maintain control over a potentially rebellious region","He was generous","He wanted to visit"],correct:1,explanation:"Roman emperors used gifts strategically to maintain loyalty and control. A happy temple community was less likely to rebel — it was political management, not generosity."},
{topic:"Palestine",question:"Why were Jews taxed heavily by the Romans?",options:["Jews were wealthy","Taxation funded the Roman Empire and was imposed on all conquered peoples — but it caused resentment and rebellion attempts","Jews volunteered to pay","Taxes were low"],correct:1,explanation:"Heavy taxation was standard Roman practice for all conquered territories. For Jews, paying tax to a pagan empire was both financially and religiously offensive."},
{topic:"Palestine",question:"Which group's beliefs are MOST similar to modern Judaism and why?",options:["Sadducees","Essenes","Pharisees — their emphasis on Torah interpretation, oral tradition, and synagogue-based worship shaped Rabbinic Judaism","None of them"],correct:2,explanation:"Modern Judaism evolved primarily from Pharisaic tradition. Their focus on Torah interpretation, oral law, and community-based worship (not temple-dependent) survived and thrived."},

// ===== BIRTH (8) =====
{topic:"Birth",question:"Jesus was born in a STABLE among ANIMALS. Why is the humility of his birth theologically important?",options:["There were no hospitals","It shows God chose to enter the world through POVERTY and humility, not wealth and power — challenging expectations of what a 'king' looks like","The stable was nice","It was an accident"],correct:1,explanation:"The King of Kings born in a stable among animals overturns all expectations. It shows God values humility over wealth, and power comes through service, not status."},
{topic:"Birth",question:"The Magi's gifts of Gold, Frankincense and Myrrh each represent an aspect of Jesus. Which combination is correct?",options:["King, Teacher, Healer","King (Gold), Priest (Frankincense), Death/Prophet (Myrrh)","Wealth, Smell, Medicine","Power, Prayer, Perfume"],correct:1,explanation:"Gold = kingship. Frankincense = priesthood (used in worship). Myrrh = death/burial (foreshadowing crucifixion). Together they summarise Jesus's entire life and purpose."},
{topic:"Birth",question:"Why is it significant that SHEPHERDS (not kings or priests) heard the news first?",options:["Shepherds were closest","It shows God's message was for ORDINARY, humble people first — the gospel isn't just for the elite but for everyone","Shepherds were religious leaders","Angels prefer shepherds"],correct:1,explanation:"In Jewish society, shepherds were lowly workers. God chose them first, showing that Jesus's message is for ordinary people — not just the wealthy or powerful."},
{topic:"Birth",question:"How does Jesus's birth narrative LINK to Noah's Ark?",options:["Both happened in December","Animals present at both. The stable = a 'new Ark' from which God's NEW creation flows, just as Noah's Ark preserved God's first creation","Both involved water","Both had angels"],correct:1,explanation:"Key cross-topic link: the Ark preserved creation during judgement. The stable (with animals) is where God's NEW creation begins through Jesus. Old Ark → New Ark."},
{topic:"Birth",question:"The Magi came 'from far away'. What does this symbolise about Jesus's message?",options:["Foreign travel was common","Jesus's message is for ALL NATIONS and ALL PEOPLE, not just the Jews — it's universal, like Noah's covenant","They were lost","They wanted gold"],correct:1,explanation:"The Magi represent the Gentile (non-Jewish) world. Their journey shows Jesus's significance extends beyond Israel to all nations — a universal message."},
{topic:"Birth",question:"Myrrh was used in burial. Why is it significant that this was given at Jesus's BIRTH?",options:["It's a coincidence","It foreshadows Jesus's DEATH from the very beginning — suggesting his purpose was always to sacrifice himself","Myrrh smells nice for babies","It was the cheapest gift"],correct:1,explanation:"Giving a burial spice at a birth is deeply symbolic. From his very first moments, Jesus's destiny — suffering and death for humanity — was being foretold."},
{topic:"Birth",question:"What does the STAR symbolise and how does it relate to Jesus's role?",options:["It's just astronomy","The star GUIDES people to Jesus, just as Jesus himself is 'the way, the truth and the life' — a guide for all humanity","Stars were worshipped","It was very bright"],correct:1,explanation:"The star guided the Magi to Jesus. Symbolically, Jesus himself IS the guide — 'the way' by which all should follow to find salvation."},
{topic:"Birth",question:"Jesus's birth was 'humble but special'. How do BOTH aspects work together?",options:["They contradict each other","Humility (stable, animals, shepherds) shows God values the lowly. Special (star, angels, Magi) shows divine purpose. God works through the unexpected","Only one aspect matters","Neither matters"],correct:1,explanation:"The combination is the whole point: God chose the MOST humble circumstances for the MOST important event. It challenges human expectations about where greatness comes from."},

// ===== MIRACLES (8) =====
{topic:"Miracles",question:"Jesus healed a Roman soldier's dying daughter. Why is it significant that he helped a ROMAN?",options:["Romans paid more","It shows Jesus's compassion crosses ALL boundaries — even helping people from the group oppressing his people. Love has no limits","He had to obey Romans","The Roman threatened him"],correct:1,explanation:"This is powerful: Romans oppressed Jews, didn't believe in Jesus, yet Jesus helped anyway. It demonstrates that divine compassion has NO boundaries — not ethnicity, religion, or politics."},
{topic:"Miracles",question:"What THREE elements must an event have to be classified as a miracle?",options:["Big, impressive, public","Cannot be explained by nature, caused by a supernatural being, fulfils a purpose or aim","Unexpected, helpful, witnessed","Religious, ancient, written down"],correct:1,explanation:"All three elements are needed: 1) breaks natural law, 2) caused by supernatural being, 3) has a purpose. Remove any one and it's not technically a miracle."},
{topic:"Miracles",question:"A student says 'The Good Samaritan is my favourite miracle.' What is WRONG with this statement?",options:["Nothing — it is a miracle","The Good Samaritan is a PARABLE (a story with moral meaning), NOT a miracle (a supernatural event) — they're completely different","It's actually a prayer","It's actually a law"],correct:1,explanation:"This is a crucial distinction exam boards love: PARABLES are stories with moral meaning. MIRACLES are supernatural events. The Good Samaritan is a PARABLE Jesus told, not something that supernaturally happened."},
{topic:"Miracles",question:"The feeding of the 5,000 is called 'Fullness and Abundance'. What does this title reveal about the miracle's meaning?",options:["There was a lot of food","God provides MORE than enough — from almost nothing, there was abundance. It shows God's provision is limitless and exceeds expectations","5,000 is a big number","Bread is abundant in Israel"],correct:1,explanation:"The title captures the theological point: from almost nothing (one fish, one bread), God created abundance for 5,000. God's provision isn't just sufficient — it's overflowing."},
{topic:"Miracles",question:"Why might a non-believer struggle with the concept of miracles?",options:["They're not smart enough","Miracles by definition break natural law — someone who believes only in natural explanations would find this contradictory","They haven't read the Bible","Non-believers can't understand stories"],correct:1,explanation:"Miracles require accepting the supernatural. Someone with a purely naturalistic worldview would argue there must be a natural explanation. This tension is important in RE."},
{topic:"Miracles",question:"Water to wine is categorised as 'Conquering Celebration'. Why 'conquering'?",options:["Jesus conquered the Romans","Wine represents joy triumphing over shortage — Jesus CONQUERED the problem and transformed a potential embarrassment into celebration","He won a competition","Wine conquers thirst"],correct:1,explanation:"The wedding was about to fail (no wine = social disaster). Jesus didn't just fix the problem — he transformed it into abundance. Joy conquered shortage."},
{topic:"Miracles",question:"How might believing in Jesus's miracles influence a Christian's daily life TODAY?",options:["They'd expect miracles daily","It gives them HOPE that God can transform impossible situations, encourages helping others (even enemies), and shows second chances are possible","It wouldn't affect them","They'd become doctors"],correct:1,explanation:"Belief in miracles provides hope (God can do the impossible), models compassion (help everyone, including enemies), and shows that transformation and second chances are always possible."},
{topic:"Miracles",question:"The 'dying child' miracle shows Jesus helped a Roman's daughter. How does this connect to the Good Samaritan parable?",options:["They're unrelated","Both teach that compassion should cross boundaries — helping even those you might consider enemies or outsiders","Both involve children","Both happened in the same place"],correct:1,explanation:"Cross-topic link: the miracle (helping a Roman's child) and the parable (Samaritan helping a Jew) both teach that compassion must cross social, ethnic, and political boundaries."},

// ===== PARABLES (8) =====
{topic:"Parables",question:"'An earthly story with a heavenly meaning.' Why did Jesus use everyday situations rather than complex theology?",options:["He wasn't very educated","Everyday stories are ACCESSIBLE to everyone — farmers, fishermen, tax collectors could all understand. It's inclusive teaching","He couldn't think of better stories","People only liked simple stories"],correct:1,explanation:"Jesus's audience was ordinary people. By using farming, money, travel — things they knew — he made deep spiritual truths accessible to everyone, not just scholars."},
{topic:"Parables",question:"In the Good Samaritan, why is it significant that the HERO is a Samaritan?",options:["Samaritans were popular","Samaritans were DESPISED by Jews — making a hated outsider the hero deliberately challenges prejudice and forces listeners to rethink who their 'neighbour' is","Samaritans were wealthy","It's random"],correct:1,explanation:"Jews and Samaritans were enemies. By making a Samaritan the hero (while a priest and Levite walked past), Jesus directly challenged his audience's prejudice."},
{topic:"Parables",question:"The Dishonest Steward is confusing — why would Jesus PRAISE a dishonest person?",options:["Jesus approves of dishonesty","Jesus isn't praising dishonesty but the steward's SHREWDNESS and urgency in preparing for the future — believers should be equally urgent about eternity","It's a mistranslation","Jesus didn't understand the story"],correct:1,explanation:"The point isn't 'be dishonest'. It's 'be as CLEVER and URGENT about your spiritual future as this man was about his financial future.' It's about urgency, not morality."},
{topic:"Parables",question:"'You cannot serve both God and money.' Why might this teaching be CHALLENGING for wealthy Christians?",options:["It's not challenging","It forces them to examine whether their wealth serves God's purposes or replaces God as their priority — are they generous or greedy?","Wealthy people don't read parables","Money is always evil in Christianity"],correct:1,explanation:"This doesn't say 'money is evil' — it says money can't be your MASTER. Wealthy Christians must ask: does my money serve God (charity, justice) or do I serve my money?"},
{topic:"Parables",question:"How is a parable different from a fable?",options:["They're identical","Parables have SPIRITUAL/heavenly meaning about God's kingdom. Fables teach MORAL lessons about behaviour. Both use stories but for different purposes","Fables are longer","Parables are for adults, fables for children"],correct:1,explanation:"Fables (dog, fox) = moral behaviour lessons. Parables = spiritual truths about God's kingdom. The Good Samaritan teaches about God's love, not just 'be nice'."},
{topic:"Parables",question:"'Faithfulness in small things is a test of trustworthiness' (from the Dishonest Steward). How does this apply to an 11-year-old?",options:["It doesn't apply to children","How you handle small responsibilities (homework, chores, keeping promises) shows your CHARACTER — if trustworthy in small things, you'll be trusted with bigger things","Only money counts","You should be dishonest about small things"],correct:1,explanation:"This is very practical: if you're honest about small things (homework, promises, being kind), people see your character. Trustworthiness in small matters leads to bigger opportunities."},
{topic:"Parables",question:"Why do Christians study parables rather than just reading them once?",options:["They're forgetful","Parables have LAYERS of meaning that reveal themselves over time — deeper study uncovers new insights relevant to different situations in life","They're too short","They're hard to understand"],correct:1,explanation:"Parables are deceptively simple. The Good Samaritan seems straightforward but raises deep questions about prejudice, duty, and love that become more complex with study."},
{topic:"Parables",question:"The Good Samaritan teaches 'act like Jesus to please God'. How does this connect to the miracles Jesus performed?",options:["No connection","Both parables AND miracles show the same principle: compassion without boundaries. Jesus TAUGHT it (parables) and DEMONSTRATED it (miracles)","Miracles are more important","Parables came first"],correct:1,explanation:"Cross-topic link: Jesus didn't just TELL stories about compassion (parables) — he SHOWED it through action (miracles like healing a Roman's daughter). Teaching and practice aligned."},

// ===== DEATH (8) =====
{topic:"Death",question:"Jesus was crucified — a punishment for the WORST criminals. Why is this significant for Christians?",options:["It's embarrassing","The most DEGRADING death possible makes the sacrifice GREATER — God's son endured the worst humanity could offer, showing the depth of divine love","It was the only option","Romans always crucified people"],correct:1,explanation:"Crucifixion was deliberately humiliating — for slaves and rebels. That God's son endured THIS makes the sacrifice more profound. The deeper the suffering, the greater the love shown."},
{topic:"Death",question:"Jesus's death is called BOTH a sacrifice AND a victory. How can it be both simultaneously?",options:["It can't — only one is correct","SACRIFICE: he gave his life for humanity's sins. VICTORY: his resurrection proved death couldn't hold him — the sacrifice LED to the victory","They're the same thing","Victory came first"],correct:1,explanation:"They work together: the sacrifice (dying for sins) was the price. The victory (resurrection defeating death) was the result. Without sacrifice, no victory. Without victory, sacrifice would be meaningless."},
{topic:"Death",question:"The temple curtain tore when Jesus died. What is the DEEPER symbolism of this?",options:["It was old fabric","The curtain separated ordinary people from God's presence (Holy of Holies). It tearing means Jesus's death REMOVED the barrier — ALL people can now access God directly","An earthquake ripped it","It was decorative"],correct:1,explanation:"This is hugely symbolic: previously only the High Priest could enter God's presence. The torn curtain means Jesus's death opened direct access to God for EVERYONE — no more barriers."},
{topic:"Death",question:"Why did BOTH Roman AND Jewish authorities want Jesus dead?",options:["They always agreed","Romans saw a POLITICAL threat (potential rebel king). Jewish leaders saw RELIGIOUS threat (blasphemer challenging their authority). Different reasons, same outcome","He committed a crime","Only Romans wanted him dead"],correct:1,explanation:"Key distinction: Romans feared political rebellion ('King of the Jews' challenged Caesar). Jewish leaders feared religious disruption (claiming to be God's son = blasphemy). Both had reasons."},
{topic:"Death",question:"'Substitutionary atonement' — what does this mean in simple terms?",options:["Jesus was a substitute teacher","Jesus (sinless) took the PUNISHMENT that humanity deserved for their sins — he stood in humanity's place as a substitute","Jesus replaced God","Humanity substituted for Jesus"],correct:1,explanation:"Like someone taking a detention you deserved: Jesus was sinless but took the punishment for everyone else's sins. He substituted himself to reconcile (atone) humanity with God."},
{topic:"Death",question:"How does Jesus's death LINK to the Passover lamb?",options:["Both died in spring","The Passover lamb was SACRIFICED so Jews could be FREE. Jesus = 'Lamb of God' SACRIFICED so humanity could be free from sin. Same pattern, ultimate fulfilment","Both were animals","No connection"],correct:1,explanation:"Crucial connection: Passover lamb's blood saved firstborns → freedom from slavery. Jesus's blood (sacrifice) saves believers → freedom from sin. Christians see Jesus as the ultimate Passover lamb."},
{topic:"Death",question:"Simon helped Jesus carry the cross. What might this symbolise?",options:["Simon was strong","Even ordinary people play a part in God's plan — and following Jesus may involve sharing in suffering and service","Simon was punished","It was random"],correct:1,explanation:"Simon represents how ordinary people are called to share in Christ's journey — including suffering. Christians are called to 'carry their cross' (face difficulties) in following Jesus."},
{topic:"Death",question:"Why is it important that Jesus's death was VOLUNTARY, not forced?",options:["It doesn't matter","A forced death would just be execution. A VOLUNTARY death shows deliberate self-sacrifice out of LOVE — it changes the meaning entirely","He could have escaped","Romans forced everyone"],correct:1,explanation:"The voluntary nature transforms the meaning: this isn't just another execution. Jesus CHOSE to die, making it an act of love, not punishment. Choice is what makes it a sacrifice."},

// ===== RESURRECTION (8) =====
{topic:"Resurrection",question:"Why is it significant that WOMEN discovered the empty tomb?",options:["Women wake up earlier","In first-century Palestine, women's testimony wasn't legally valid. Including them suggests the authors recorded what ACTUALLY happened rather than inventing a more credible story","Women were more religious","It was a coincidence"],correct:1,explanation:"If you were INVENTING a story, you'd use male witnesses (legally valid). Including women — whose testimony was dismissed — actually SUPPORTS authenticity. It's too unlikely to be fabricated."},
{topic:"Resurrection",question:"There are 4 different Gospel accounts of the resurrection. A critic says this proves they're unreliable. How might a Christian respond?",options:["The critics are always wrong","Different perspectives on the SAME event is exactly what you'd expect from genuine witnesses — if all accounts were identical, it would suggest they were COPIED","Only one account is true","The differences don't exist"],correct:1,explanation:"Think of 4 people witnessing a car accident — their accounts will differ in details but agree on the main event. Identical accounts would actually be MORE suspicious (suggesting copying)."},
{topic:"Resurrection",question:"'If Christ has not been raised, our faith is in vain' (Paul). Why is the resurrection THE foundation of Christianity?",options:["It's just important, not foundational","Without resurrection, Jesus is just a dead teacher. Resurrection PROVES he conquered death, validates his claims to be God's son, and makes eternal life possible","Paul exaggerated","The crucifixion is more important"],correct:1,explanation:"The resurrection is what distinguishes Christianity. Without it: Jesus is just another executed preacher. With it: he conquered death, proved he was divine, and opened eternal life."},
{topic:"Resurrection",question:"The argument that 'women went to the wrong tomb' is sometimes used to explain the empty tomb. What is the strongest counter-argument?",options:["Women can't make mistakes","If it was the wrong tomb, Jewish authorities could have simply shown everyone the RIGHT tomb with Jesus's body still in it — ending Christianity immediately","The tomb had a sign","Angels prevented mistakes"],correct:1,explanation:"This is the strongest counter: if the tomb was simply wrong, authorities would have opened the correct one, shown the body, and ended the whole movement instantly. They didn't — or couldn't."},
{topic:"Resurrection",question:"Why do Christians worship on SUNDAY rather than Saturday (Jewish Shabbat)?",options:["Sunday is more convenient","Jesus rose on SUNDAY — Christians worship on the day of resurrection, making it 'the Lord's Day' rather than the Jewish Sabbath","The Romans changed it","Sunday was a holiday"],correct:1,explanation:"The shift from Saturday (Shabbat) to Sunday (Lord's Day) is directly because of the resurrection. It's one of the clearest ways the resurrection changed religious practice."},
{topic:"Resurrection",question:"'Christians call Jesus the Messiah.' What does this actually MEAN and why did it matter?",options:["Messiah = good person","Messiah (Hebrew) / Christ (Greek) = 'The Anointed One' — the promised deliverer Jews had waited centuries for. Claiming this was revolutionary and controversial","It's just a name","It means teacher"],correct:1,explanation:"Messiah/Christ = 'Anointed One' — the prophesied saviour. Jews had waited centuries. Claiming Jesus was THE Messiah was either the most important truth in history or the worst blasphemy."},
{topic:"Resurrection",question:"How does the resurrection complete the 'sacrifice and victory' theme of Jesus's death?",options:["It doesn't connect","Death = SACRIFICE (paying for sin). Resurrection = VICTORY (proving sacrifice worked and death was conquered). Without resurrection, the sacrifice would appear to have failed","Victory came first","Only sacrifice matters"],correct:1,explanation:"They're two halves of one event: sacrifice without victory = failure. Victory without sacrifice = no cost. Together: Jesus paid the ultimate price (death) and proved it worked (resurrection)."},
{topic:"Resurrection",question:"Why might the resurrection be the HARDEST part of Christianity for a non-believer to accept?",options:["It's badly written","It claims a dead person physically came back to life — this fundamentally contradicts all scientific understanding of death and requires a leap of FAITH","Non-believers can't read","It's not hard to accept"],correct:1,explanation:"The resurrection is the ultimate supernatural claim. Unlike moral teachings (which anyone can appreciate), accepting bodily resurrection requires faith beyond scientific evidence."},

// ===== GOSPELS & CONNECTIONS (8) =====
{topic:"Connections",question:"How does the theme of COVENANT develop from Noah through to Jesus?",options:["It doesn't develop","Noah: universal covenant (rainbow, all humanity) → Moses: specific covenant (law, Jewish people) → Jesus: new covenant (sacrifice, all who believe). Each builds on the last","They're separate stories","Only Noah has a covenant"],correct:1,explanation:"The covenant theme DEVELOPS: Noah's is universal but basic. Moses's adds detailed law. Jesus's is presented as the ultimate fulfilment — each stage building toward God's complete plan."},
{topic:"Connections",question:"The Passover lamb, the Zeroa bone, and Jesus's death all share a theme. What is it?",options:["They all involve bones","SACRIFICE leading to FREEDOM — the lamb's blood freed Israelites, the bone remembers that sacrifice, and Jesus's death frees humanity from sin","They all happened at Passover","They're unrelated"],correct:1,explanation:"Sacrifice → freedom is the thread: Passover lamb's sacrifice freed slaves. Zeroa recalls that sacrifice. Jesus is the 'Lamb of God' whose sacrifice frees from sin. One theme across centuries."},
{topic:"Connections",question:"How does understanding the Pharisees and Sadducees help explain WHY Jesus was crucified?",options:["It doesn't help","The Pharisees' emphasis on religious law made Jesus's claims seem blasphemous. The Sadducees' alliance with Rome made Jesus a political risk. Understanding BOTH groups explains the combined opposition","Only Romans matter","Jesus upset everyone equally"],correct:1,explanation:"Without knowing these groups, the crucifixion seems random. WITH context: Pharisees saw religious threat, Sadducees saw political threat — together they created the forces that killed Jesus."},
{topic:"Connections",question:"Noah's Ark had animals. Jesus's stable had animals. The Good Samaritan involves a journey. What COMMON THEME links these?",options:["They all involve animals","God works through UNEXPECTED and humble circumstances — an ark, a stable, a despised traveller. God's greatest acts happen in the most unlikely places","They're in the same book","There is no theme"],correct:1,explanation:"God consistently works through the unexpected: saving creation through a boat, entering the world through a stable, teaching love through an enemy. Humility and surprise are God's methods."},
{topic:"Gospels",question:"If all 4 Gospels told the EXACT same story with NO differences, would this be MORE or LESS convincing?",options:["More convincing","LESS convincing — it would suggest the accounts were COPIED rather than independently written. Some variation actually SUPPORTS authenticity","It would make no difference","We can't know"],correct:1,explanation:"Counter-intuitive but true: identical accounts suggest copying. Different perspectives (like 4 witnesses at a crime scene) actually support genuine independent testimony."},
{topic:"Gospels",question:"What does the word 'Gospel' mean and why is this significant?",options:["Old story","'GOOD NEWS' — the authors saw themselves as sharing the best news in human history: God entered the world, died for sins, and conquered death","Holy book","God's words"],correct:1,explanation:"Gospel = 'Good News' (from Greek 'evangelion'). This name reveals the authors' PURPOSE: they weren't writing history textbooks but sharing what they believed was the most important news ever."},
{topic:"Connections",question:"How does the concept of SACRIFICE develop from Passover → Temple worship → Jesus's death?",options:["It doesn't develop","Passover: animal sacrifice for one event. Temple: regular animal sacrifices for ongoing sin. Jesus: ONE ultimate sacrifice for ALL sin, forever. Each stage increases in scope","They're all the same","Only Jesus's sacrifice counts"],correct:1,explanation:"The progression: Passover = one lamb, one event. Temple = many animals, ongoing. Jesus = one sacrifice, eternal. Christians believe Jesus made all other sacrifices unnecessary."},
{topic:"Connections",question:"If you had to explain the WHOLE Year 7 RE course in ONE sentence, using the theme of covenant, what would it be?",options:["God made rules","God repeatedly made covenants (promises) with humanity — from creation through Noah, Moses, and finally Jesus — each time offering relationship in exchange for faithfulness","Jesus is important","The Bible has stories"],correct:1,explanation:"The entire course traces God's relationship with humanity through covenants: creating, judging (flood), freeing (Passover), guiding (Torah), and ultimately sacrificing (Jesus) — always offering relationship."},
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

${s.wrong.length?`<div class="card" style="margin-bottom:20px"><h3 style="margin:0 0 16px;font-size:18px;font-weight:800;color:#FF6B6B">📝 Review These (read explanations!)</h3>${s.wrong.map(q=>`<div class="review-item"><div style="font-size:12px;color:${TC[q.topic]||'#888'};font-weight:800;margin-bottom:4px">${TI[q.topic]||'📝'} ${q.topic}</div><div style="font-size:14px;font-weight:700;margin-bottom:6px">${esc(q.question)}</div><div style="font-size:13px;color:#51CF66;font-weight:600">✓ ${esc(q.options[q.correct])}</div><div style="font-size:13px;color:#9898b8;margin-top:4px;line-height:1.6">${esc(q.explanation)}</div></div>`).join('')}</div>`:''}
<div class="bottom-grid"><button class="btn card" onclick="startQuiz(${s.qt?`'${s.qt}'`:'null'})" style="text-align:center;cursor:pointer;padding:16px;background:linear-gradient(135deg,#FF6B6B15,#FF6B6B05);border-color:#FF6B6B44"><div style="font-size:24px">🔄</div><div style="font-size:12px;font-weight:800;margin-top:6px">Again</div></button><button class="btn card" onclick="S({mode:'cheatsheet',ct:0})" style="text-align:center;cursor:pointer;padding:16px;background:linear-gradient(135deg,#51CF6615,#51CF6605);border-color:#51CF6644"><div style="font-size:24px">📖</div><div style="font-size:12px;font-weight:800;margin-top:6px">Cheat Sheet</div></button><button class="btn card" onclick="S({mode:'home'})" style="text-align:center;cursor:pointer;padding:16px;background:linear-gradient(135deg,#339AF015,#339AF005);border-color:#339AF044"><div style="font-size:24px">🏠</div><div style="font-size:12px;font-weight:800;margin-top:6px">Home</div></button></div>`;return;}}

function startQuiz(topic){let q=topic?Q.filter(x=>x.topic===topic):[...Q];q=shuffle(q).map(x=>{const idx=x.options.map((_,i)=>i);const sh=shuffle(idx);return{...x,options:sh.map(i=>x.options[i]),correct:sh.indexOf(x.correct)};});S({mode:'quiz',qs:q,cq:0,sel:null,showAns:false,score:0,ans:0,streak:0,best:0,wrong:[],qt:topic});}window.startQuiz=startQuiz;
function pickAnswer(i){if(state.showAns)return;const c=i===state.qs[state.cq].correct;const ns=c?state.streak+1:0;S({sel:i,showAns:true,ans:state.ans+1,score:state.score+(c?1:0),streak:ns,best:Math.max(state.best,ns),wrong:c?state.wrong:[...state.wrong,state.qs[state.cq]]});}window.pickAnswer=pickAnswer;
function nextQ(){if(state.cq+1>=state.qs.length)S({mode:'results'});else S({cq:state.cq+1,sel:null,showAns:false});}window.nextQ=nextQ;
function startFlash(cat){let c=cat?FLASHCARDS.filter(x=>x.cat===cat):[...FLASHCARDS];S({mode:'flashcards',fc:shuffle(c),fi:0,flipped:false,fcCat:cat,fcScore:0,fcTotal:0});}window.startFlash=startFlash;
function fcRate(k){const n=state.fi+1>=state.fc.length;S({fcScore:state.fcScore+(k?1:0),fcTotal:state.fcTotal+1,fi:n?state.fi:state.fi+1,flipped:false,mode:n?'fc_results':'flashcards'});}window.fcRate=fcRate;
render();
</script>
